<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cosmic</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>

  <canvas id="stars"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Nav toggle button -->
  <button class="nav-toggle" id="navToggle" title="Menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Sliding sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">cosmic</span>
      <button class="sidebar-close" id="sidebarClose">✕</button>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a class="nav-item" data-page="chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Global Chat
      </a>
      <a class="nav-item" data-page="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
      <a class="nav-item" data-page="account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Account
      </a>
    </nav>
    <div class="sidebar-footer" id="sidebarUserArea">
      <div class="sidebar-user-guest">
        <span>not signed in</span>
        <button class="btn-pill" onclick="openPage('account')">sign in</button>
      </div>
    </div>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Main UI -->
  <main class="center" id="mainContent">
    <div class="logo-wrap">
      <h1 class="logo">cosmic</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="enter a url or search..." autocomplete="off" spellcheck="false"/>
        <button class="go-btn" id="goBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
      <p class="hint">press <kbd>enter</kbd> or click the arrow</p>
    </div>
  </main>

  <!-- Proxy frame -->
  <div class="frame-wrap" id="frameWrap">
    <div class="frame-bar">
      <button class="frame-close" id="frameClose">✕</button>
      <span class="frame-url" id="frameUrl"></span>
    </div>
    <iframe id="proxyFrame" title="Cosmic Proxy"></iframe>
  </div>

  <!-- Page overlays -->
  <div class="page-overlay" id="page-chat"></div>
  <div class="page-overlay" id="page-settings"></div>
  <div class="page-overlay" id="page-account"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="/uv.config.js"></script>
  <script src="/uv/uv.bundle.js"></script>
  <script src="/baremux/index.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>

<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>
<div class="modal" id="createRoomModal">
  <div class="modal-title">create private room</div>
  <div class="auth-field">
    <label class="auth-label">room name</label>
    <input class="auth-input" id="modalRoomName" placeholder="my room" maxlength="30" />
  </div>
  <div class="auth-field">
    <label class="auth-label">password <span style="color:var(--muted);font-size:0.68rem">(optional)</span></label>
    <input class="auth-input" id="modalRoomPassword" type="password" placeholder="leave blank for no password" />
  </div>
  <div class="auth-field">
    <label class="auth-label">invite user by email <span style="color:var(--muted);font-size:0.68rem">(optional)</span></label>
    <input class="auth-input" id="modalRoomInvite" type="email" placeholder="friend@example.com" />
  </div>
  <div class="auth-error" id="modalRoomError"></div>
  <div style="display:flex;gap:10px;margin-top:16px">
    <button class="auth-submit" onclick="submitCreateRoom()" style="flex:1">create</button>
    <button class="profile-signout" onclick="closeModal()" style="flex:1">cancel</button>
  </div>
</div>

</body>
</html>
